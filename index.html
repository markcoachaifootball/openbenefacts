<!DOCTYPE html>
<html lang="en-IE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>OpenBenefacts — Irish Nonprofit Transparency</title>
    <meta name="description" content="Ireland's nonprofit transparency platform. Search 40,000+ charities, track €14B in government funding. Free financial records, governance data, and Follow the Money." />
    <meta name="keywords" content="Irish nonprofits, Ireland charities database, Irish charity finances, nonprofit transparency Ireland, charity regulator Ireland, Benefacts replacement, Irish nonprofit database, Ireland government funding nonprofits, charity due diligence Ireland, follow the money Ireland" />
    <meta name="author" content="OpenBenefacts" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#1B3A4B" />
    <meta name="googlebot" content="index, follow" />

    <link rel="canonical" href="https://www.openbenefacts.ie/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Brand fonts — Archivo Black for wordmark, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { background: #f8f9fa; font-family: 'Archivo', system-ui, -apple-system, sans-serif; }
      .font-wordmark { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; letter-spacing: -0.01em; }
    </style>

    <!-- Open Graph — social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OpenBenefacts" />
    <meta property="og:title" content="OpenBenefacts — Ireland's Nonprofit Transparency Platform" />
    <meta property="og:description" content="Search 40,000+ Irish charities. Track €14 billion in government funding. Free financial records, governance data, and Follow the Money visualisations — open to everyone." />
    <meta property="og:url" content="https://www.openbenefacts.ie/" />
    <meta property="og:image" content="https://www.openbenefacts.ie/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="OpenBenefacts — Irish Nonprofit Transparency" />
    <meta property="og:locale" content="en_IE" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@openbenefacts" />
    <meta name="twitter:title" content="OpenBenefacts — Ireland's Nonprofit Transparency Platform" />
    <meta name="twitter:description" content="Search 40,000+ Irish charities. Track €14 billion in government funding. Financial records, governance data, and Follow the Money visualisations." />
    <meta name="twitter:image" content="https://www.openbenefacts.ie/og-image.png" />

    <!-- JSON-LD structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OpenBenefacts",
      "alternateName": "Open Benefacts",
      "url": "https://www.openbenefacts.ie",
      "logo": "https://www.openbenefacts.ie/og-image.png",
      "description": "OpenBenefacts is Ireland's nonprofit transparency platform — an independent, free-to-search database of 40,000+ charities, housing bodies, schools and sports clubs, with financial records and government funding data.",
      "foundingDate": "2026",
      "areaServed": {
        "@type": "Country",
        "name": "Ireland"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD structured data: WebSite with sitelinks search box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OpenBenefacts",
      "url": "https://www.openbenefacts.ie",
      "description": "Ireland's nonprofit transparency platform. Search 40,000+ charities and track €14 billion in government funding.",
      "inLanguage": "en-IE",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.openbenefacts.ie/orgs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD structured data: Dataset (for Google Dataset Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "OpenBenefacts — Irish Nonprofit Financial Records",
      "description": "A comprehensive, continuously updated dataset of 40,000+ Irish nonprofit organisations including charities, approved housing bodies, schools, and sports clubs. Contains 64,000+ financial records and €14 billion in tracked government funding flows. Sourced from the Charities Regulator, Revenue Commissioners, CRO, and other Irish government datasets.",
      "url": "https://www.openbenefacts.ie",
      "keywords": ["Irish charities", "nonprofit transparency", "Ireland government funding", "charity financials", "Benefacts"],
      "creator": {
        "@type": "Organization",
        "name": "OpenBenefacts"
      },
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "spatialCoverage": {
        "@type": "Place",
        "name": "Ireland"
      },
      "temporalCoverage": "2015/..",
      "distribution": [
        {
          "@type": "DataDownload",
          "encodingFormat": "CSV",
          "contentUrl": "https://www.openbenefacts.ie/#funders"
        },
        {
          "@type": "DataDownload",
          "encodingFormat": "application/json",
          "contentUrl": "https://www.openbenefacts.ie/api/v1/organisations"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
