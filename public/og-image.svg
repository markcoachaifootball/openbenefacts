<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo -->
  <rect x="60" y="50" width="48" height="48" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="84" y="82" font-family="-apple-system,sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">O</text>
  <text x="120" y="82" font-family="-apple-system,sans-serif" font-size="20" fill="white" font-weight="700">OpenBenefacts</text>
  <!-- Main headline -->
  <text x="60" y="220" font-family="-apple-system,sans-serif" font-size="72" fill="white" font-weight="800">Where Does Ireland's</text>
  <text x="60" y="310" font-family="-apple-system,sans-serif" font-size="72" fill="#6ee7b7" font-weight="800">€14 Billion Go?</text>
  <!-- Subtitle -->
  <text x="60" y="380" font-family="-apple-system,sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">Follow the money. Track government funding to 26,000+ nonprofits.</text>
  <!-- Stats bar -->
  <rect x="60" y="440" width="1080" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="60" y="490" font-family="-apple-system,sans-serif" font-size="44" fill="#6ee7b7" font-weight="700">26,906</text>
  <text x="60" y="520" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">ORGANISATIONS</text>
  <text x="360" y="490" font-family="-apple-system,sans-serif" font-size="44" fill="#6ee7b7" font-weight="700">€14B+</text>
  <text x="360" y="520" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">STATE FUNDING TRACKED</text>
  <text x="660" y="490" font-family="-apple-system,sans-serif" font-size="44" fill="#6ee7b7" font-weight="700">11 Years</text>
  <text x="660" y="520" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">FINANCIAL HISTORY</text>
  <!-- URL -->
  <text x="60" y="590" font-family="-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">openbenefacts.vercel.app</text>
  <text x="1140" y="590" font-family="-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="end">Free &amp; Open Source</text>
</svg>
